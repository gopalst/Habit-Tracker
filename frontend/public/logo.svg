<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Rounded Square with Gradient and Shadow -->
  <rect width="400" height="400" x="56" y="56" rx="100" fill="url(#primaryGrad)" filter="url(#shadow)" />
  
  <!-- Bold "HT" Text -->
  <text x="256" y="285" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="220" fill="#050505" text-anchor="middle" dominant-baseline="central" letter-spacing="-10">HT</text>
</svg>
